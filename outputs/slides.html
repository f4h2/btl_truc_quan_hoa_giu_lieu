<h2 id="dashboard-big-mac-index--the-economist">Dashboard: Big Mac Index — The Economist</h2>
<div class="two-col">
<div>
<p><strong>Dashboard gốc:</strong> <a href="https://www.economist.com/big-mac-index">The Economist – Big Mac Index</a></p>
<p><strong>Mục đích:</strong><br />
So sánh giá trị tương đối của các đồng tiền dựa trên giá một chiếc Big Mac — phiên bản đơn giản hóa của lý thuyết <strong>PPP (Purchasing Power Parity)</strong>.</p>
<p><strong>Dữ liệu sử dụng:</strong></p>
<ul>
<li>Giá Big Mac tại <strong>57 quốc gia</strong></li>
<li>Tỷ giá hối đoái so với USD</li>
<li>GDP bình quân đầu người</li>
<li>Lịch sử <strong>2000 – 2020</strong> (~1,386 quan sát)</li>
</ul>
</div>
<div>
<table>
<thead>
<tr>
<th>Cột dữ liệu</th>
<th>Ý nghĩa</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>dollar_price</code></td>
<td>Giá quy đổi USD</td>
</tr>
<tr>
<td><code>USD_raw</code></td>
<td>Mức định giá thô so USD</td>
</tr>
<tr>
<td><code>GDP_dollar</code></td>
<td>GDP per capita</td>
</tr>
<tr>
<td><code>adj_price</code></td>
<td>Giá điều chỉnh theo GDP</td>
</tr>
</tbody>
</table>
<br />
<blockquote>
<p><strong>USD_raw &gt; 0</strong> → đồng tiền đắt hơn USD<br />
<strong>USD_raw &lt; 0</strong> → đồng tiền rẻ hơn USD</p>
</blockquote>
</div>
</div>

<h2 id="story-ch%C3%ADnh">Story chính</h2>
<blockquote>
<p><em>&quot;Giá của cùng một sản phẩm trên toàn thế giới phản ánh sự khác biệt về sức mua và giá trị đồng tiền — và sự khác biệt đó không ngừng thay đổi theo thời gian và mức phát triển kinh tế.&quot;</em></p>
</blockquote>
<br />
<p>Dashboard kể câu chuyện này theo <strong>luồng tuyến tính 4 bước</strong>, mỗi bước trả lời một câu hỏi và dẫn dắt sang câu hỏi tiếp theo:</p>
<div class="kpi-row">
<div class="kpi">
<b>① Nhìn toàn cầu</b>
Quốc gia nào đắt / rẻ bất thường? <em>(Map)</em>
</div>
<div class="kpi kpi-blue">
<b>② So sánh trực tiếp</b>
Ai overvalued / undervalued nhất? <em>(Bar)</em>
</div>
<div class="kpi kpi-green">
<b>③ Theo dõi lịch sử</b>
Thay đổi thế nào qua các năm? <em>(Line)</em>
</div>
<div class="kpi">
<b>④ Tìm nguyên nhân</b>
GDP có giải thích được không? <em>(Scatter)</em>
</div>
</div>

<h2 id="story--v%C3%AD-d%E1%BB%A5-c%E1%BB%A5-th%E1%BB%83">Story — Ví dụ cụ thể</h2>
<p>Câu chuyện mà dashboard kể qua dữ liệu thực:</p>

<p><strong>Bước ①:</strong> Nhìn bản đồ → Bắc Âu (Norway, Switzerland) màu đỏ đậm, Đông Nam Á (Vietnam, Malaysia) màu xanh đậm → <em>&quot;Có sự phân cực rõ ràng giữa các khu vực&quot;</em></p>
</div>
<div class="story-step">
<p><strong>Bước ②:</strong> Bar chart → Norway +53.8%, Romania −59.8% → <em>&quot;Khoảng cách định giá lên tới hơn 100%&quot;</em></p>
</div>
<div class="story-step">
<p><strong>Bước ③:</strong> Timeline → Giá Big Mac toàn cầu tăng đều từ 2000–2020, Mỹ tăng từ $2.5 → $5.7 → <em>&quot;Đây là phản ánh của lạm phát tích lũy&quot;</em></p>
</div>
<div class="story-step">
<p><strong>Bước ④:</strong> Scatter → tương quan dương rõ ràng giữa GDP per capita và giá Big Mac → <em>&quot;Quốc gia giàu hơn thì Big Mac đắt hơn — đúng như PPP dự đoán&quot;</em></p>
</div>

<h2 id="%C6%B0u-%C4%91i%E1%BB%83m">Ưu điểm</h2>
<div class="pros">
<p><strong>① Kể chuyện dữ liệu tốt (Data Storytelling)</strong><br />
Luồng Global → Country → History → Cause dẫn dắt người dùng từ tổng quan đến nguyên nhân một cách tự nhiên, không cần hướng dẫn.</p>
</div>
<div class="pros">
<p><strong>② Multiple Coordinated Views — nhiều góc nhìn cùng dữ liệu</strong><br />
Map · Ranking · Timeline · Correlation bổ sung cho nhau trên cùng một trang, không cần chuyển màn hình.</p>
</div>
<div class="pros">
<p><strong>③ Tương tác trực quan (Interactivity)</strong><br />
Hover · Click · Drill-down cho phép người dùng khám phá theo hướng mình quan tâm — tuân thủ nguyên tắc <em>Details on Demand</em>.</p>
</div>
<div class="pros">
<p><strong>④ Thiết kế tối giản, không gây cognitive overload</strong><br />
Ít màu · Ít KPI · Không noise — tuân thủ nguyên tắc <em>data-ink ratio</em> của Tufte. Người dùng không chuyên vẫn đọc được.</p>
</div>
</section>

<h2 id="q1-t%E1%BA%A1i-sao-b%E1%BA%AFc-%C3%A2u-%C4%91%E1%BA%AFt-h%C6%A1n--v%C3%AC-gdp-cao-h%C6%A1n">Q1: Tại sao Bắc Âu đắt hơn — vì GDP cao hơn?</h2>
<p><strong>Cơ chế:</strong> GDP cao → lương cao → chi phí lao động địa phương cao → giá Big Mac cao</p>
<blockquote>
<p>Không phải thịt bò hay bánh mì (nhập khẩu được) làm Big Mac đắt — mà là <strong>lương nhân viên, tiền thuê mặt bằng, điện nước</strong> — tất cả đều tỉ lệ với mức lương chung của quốc gia.</p>
</blockquote>
<p>Đây gọi là hiệu ứng <strong>Balassa-Samuelson</strong>: quốc gia có năng suất cao hơn có xu hướng có giá hàng hóa &amp; dịch vụ <em>không giao dịch được (non-tradeable)</em> cao hơn.</p>

<h2 id="q2-big-mac-index-c%C3%B3-th%E1%BB%B1c-s%E1%BB%B1-%C4%91o-%C4%91%C6%B0%E1%BB%A3c-ppp-kh%C3%B4ng">Q2: Big Mac Index có thực sự đo được PPP không?</h2>
<p><strong>Điểm mạnh:</strong></p>
<ul>
<li>Sản phẩm chuẩn hóa toàn cầu (cùng công thức gốc)</li>
<li>Bao gồm cả chi phí địa phương (lao động, mặt bằng) → capture non-tradeable costs</li>
<li>Đơn giản, dễ hiểu — được dùng rộng rãi trong báo chí kinh tế</li>
</ul>
<p><strong>Giới hạn:</strong></p>
<ul>
<li>Big Mac không có ở mọi quốc gia (thiếu ~140 nước)</li>
<li>Công thức có thể thay đổi theo thị trường (size, thành phần)</li>
<li>Chỉ là <strong>proxy</strong> của PPP, không phải đo chính xác</li>
<li>Không phản ánh toàn bộ rổ hàng hóa tiêu dùng</li>
</ul>
<blockquote>
<p>Kết luận: Big Mac Index là <strong>chỉ báo nhanh (quick indicator)</strong>, hữu ích để nhận diện xu hướng lớn — không phải công cụ đo PPP chính xác.</p>
</blockquote>

<p><strong>adj_price (điều chỉnh GDP):</strong><br />
Điều chỉnh USD_raw theo GDP per capita tương đối so với Mỹ.</p>
<p>→ <strong>Công bằng hơn</strong> — tính đến mức sống của từng nước.</p>
<p><strong>Ví dụ:</strong> Sau điều chỉnh, Vietnam không còn &quot;undervalued&quot; đến vậy vì GDP cũng thấp tương ứng.</p>
<p><strong>Khi nào dùng adj_price?</strong><br />
Khi muốn đánh giá tỉ giá thực sự &quot;đúng&quot; hay &quot;sai&quot; về mặt kinh tế vĩ mô.</p>

<h2 id="q4-t%E1%BA%A1i-sao-ch%E1%BB%8Dn-4-bi%E1%BB%83u-%C4%91%E1%BB%93-%C4%91%C3%B3--kh%C3%B4ng-d%C3%B9ng-pie-chart--treemap">Q4: Tại sao chọn 4 biểu đồ đó — không dùng Pie Chart / Treemap?</h2>
<table>
<thead>
<tr>
<th>Lựa chọn bị loại</th>
<th>Lý do không chọn</th>
</tr>
</thead>
<tbody>
<tr>
<td>Pie Chart</td>
<td>Khó so sánh nhiều phần tử; không encode được âm/dương</td>
</tr>
<tr>
<td>Treemap</td>
<td>Không thể hiện thứ tự (ranking) hay thay đổi theo thời gian</td>
</tr>
<tr>
<td>Table</td>
<td>Không trực quan; người dùng phải đọc từng con số</td>
</tr>
<tr>
<td>Bubble Chart đơn độc</td>
<td>Khó đọc khi nhiều quốc gia chồng lên nhau</td>
</tr>
</tbody>
</table>
<p><strong>Nguyên tắc lựa chọn biểu đồ:</strong></p>
<blockquote>
<p>Chọn loại biểu đồ phù hợp với <strong>câu hỏi cần trả lời</strong> và <strong>kiểu dữ liệu</strong> — không chọn vì đẹp.</p>
</blockquote>
<ul>
<li>So sánh thứ hạng → <strong>Bar</strong></li>
<li>Thay đổi theo thời gian → <strong>Line</strong></li>
<li>Phân phối địa lý → <strong>Map</strong></li>
<li>Tương quan 2 biến → <strong>Scatter</strong></li>
</ul>
</section>

<p><strong>Bộ lọc đa chiều (Cải tiến ③)</strong> — vì giải quyết hạn chế cốt lõi của dashboard gốc.</p>
